<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">kalkula.pl logo</title>
  <desc id="desc">Kulisty znak z klawiszami kalkulatora i napisem kalkula.pl</desc>
  <defs>
    <radialGradient id="sphereShine" cx="30%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#b8ffd1"/>
      <stop offset="45%" stop-color="#2ea86b"/>
      <stop offset="85%" stop-color="#1d4f98"/>
      <stop offset="100%" stop-color="#102f63"/>
    </radialGradient>
    <linearGradient id="arcBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d2f6c"/>
      <stop offset="100%" stop-color="#1f4f97"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#baf3ff"/>
      <stop offset="100%" stop-color="#e6fbff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.28"/>
    </filter>
  </defs>

  <circle cx="600" cy="170" r="165" fill="url(#sphereShine)" filter="url(#softShadow)"/>
  <ellipse cx="600" cy="170" rx="165" ry="165" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="8"/>

  <g fill="#ffffff" fill-opacity="0.82" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="34">
    <rect x="505" y="123" width="190" height="72" rx="14" fill="url(#screen)" stroke="#1b2e54" stroke-width="5"/>
    <text x="600" y="170" text-anchor="middle" fill="#081427">kalkula.pl</text>
  </g>

  <g fill="#d9ecf5" stroke="#1e3b71" stroke-width="2" opacity="0.9">
    <rect x="486" y="68" width="38" height="34" rx="8"/>
    <rect x="530" y="68" width="38" height="34" rx="8"/>
    <rect x="574" y="68" width="38" height="34" rx="8"/>
    <rect x="618" y="68" width="38" height="34" rx="8"/>
    <rect x="662" y="68" width="38" height="34" rx="8"/>
    <rect x="486" y="206" width="38" height="34" rx="8"/>
    <rect x="530" y="206" width="38" height="34" rx="8"/>
    <rect x="574" y="206" width="38" height="34" rx="8"/>
    <rect x="618" y="206" width="38" height="34" rx="8"/>
    <rect x="662" y="206" width="38" height="34" rx="8"/>
  </g>

  <path d="M250 360c100-95 600-95 700 0" fill="none" stroke="url(#arcBlue)" stroke-width="30" stroke-linecap="round"/>
  <path d="M290 355c110-65 520-65 620 0" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
  <text x="600" y="430" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="94" font-weight="800" transform="rotate(-8 600 430)">kalkula.pl</text>
</svg>
