<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 92" role="img" aria-labelledby="title desc">
  <title id="title">kalkula.pl logo</title>
  <desc id="desc">Kolorowa maskotka kalkulatora w okrągłej odznace</desc>

  <defs>
